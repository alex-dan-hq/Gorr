<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L2 Task Graph — UK Grocery Retail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0D0D0F; --card: #141416; --elevated: #1A1A1E; --border: #2A2A2E;
  --text: #E8E8ED; --text-muted: #8B8B96; --text-dim: #5A5A64;
  --green: #2D7A4F; --yellow: #D4A843; --orange: #E07A3A; --red: #E05252;
  --accent: #5E6AD2;
}
html, body { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

.top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 48px; background: rgba(13,13,15,0.94); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; }
.top-bar h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
.top-bar h1 .subtitle { font-weight: 400; font-size: 12px; color: var(--text-muted); }

.controls { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.control-group { display: flex; gap: 2px; background: var(--card); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
.ctrl-btn { padding: 4px 10px; font-size: 11px; font-weight: 500; color: var(--text-muted); cursor: pointer; border: none; background: transparent; transition: all 0.2s; font-family: inherit; white-space: nowrap; }
.ctrl-btn:hover { color: var(--text); background: var(--elevated); }
.ctrl-btn.active { color: #fff; background: var(--accent); }

.role-filters { display: flex; gap: 4px; margin-left: 12px; align-items: center; }
.role-filter { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all 0.2s; font-family: inherit; }
.role-filter.active { opacity: 1; }
.role-filter:not(.active) { opacity: 0.35; }
.role-filter:hover { opacity: 0.8; }

.main-container { position: absolute; top: 48px; left: 0; right: 0; bottom: 0; display: flex; }
.graph-area { flex: 1; position: relative; overflow: hidden; }
.graph-area svg { width: 100%; height: 100%; }

/* Detail Panel */
.detail-panel { position: absolute; top: 0; right: 0; bottom: 0; width: 380px; background: var(--card); border-left: 1px solid var(--border); z-index: 50; transform: translateX(100%); transition: transform 0.3s ease; overflow-y: auto; padding: 20px; }
.detail-panel.open { transform: translateX(0); }
.detail-panel::-webkit-scrollbar { width: 5px; }
.detail-panel::-webkit-scrollbar-track { background: transparent; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.dp-close { position: absolute; top: 12px; right: 12px; width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
.dp-close:hover { background: var(--card); color: var(--text); }
.dp-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; padding-right: 32px; line-height: 1.3; }
.dp-domain { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.dp-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
.dp-row-label { color: var(--text-muted); }
.dp-row-value { font-weight: 600; }
.dp-section { margin-top: 16px; }
.dp-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 8px; font-weight: 700; }
.dp-role-entry { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
.dp-role-name { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.dp-indicators { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.dp-indicator { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 500; }
.dp-indicator.H { background: rgba(224,82,82,0.2); color: var(--red); }
.dp-indicator.M { background: rgba(212,168,67,0.2); color: var(--yellow); }
.dp-indicator.L { background: rgba(45,122,79,0.2); color: var(--green); }
.dp-quote { font-size: 11px; font-style: italic; color: var(--text-muted); line-height: 1.5; border-left: 2px solid var(--border); padding-left: 8px; margin-top: 6px; }
.dp-tools { display: flex; flex-wrap: wrap; gap: 4px; }
.dp-tool-tag { padding: 2px 6px; border-radius: 3px; font-size: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text-muted); }
.dp-impact { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 12px; }
.dp-impact-title { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.dp-impact-text { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

/* Solution lens stats bar */
.solution-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 44px; background: rgba(20,20,22,0.95); backdrop-filter: blur(8px); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 24px; transform: translateY(100%); transition: transform 0.3s; z-index: 40; }
.solution-bar.visible { transform: translateY(0); }
.solution-bar .sb-stat { font-size: 12px; color: var(--text-muted); }
.solution-bar .sb-stat strong { color: var(--text); font-weight: 700; }
.solution-bar .sb-reset { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; font-family: inherit; margin-left: auto; }
.solution-bar .sb-reset:hover { background: var(--elevated); color: var(--text); }

/* Tooltip */
.tooltip { position: fixed; z-index: 200; background: var(--elevated); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; pointer-events: none; opacity: 0; transition: opacity 0.12s; max-width: 300px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.tooltip.visible { opacity: 1; }
.tooltip .tt-name { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.tooltip .tt-row { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.tooltip .tt-quote { font-size: 10px; font-style: italic; color: var(--text-dim); margin-top: 5px; border-left: 2px solid var(--border); padding-left: 6px; line-height: 1.4; }

/* Legend */
.legend { position: absolute; bottom: 8px; left: 8px; background: rgba(20,20,22,0.9); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; z-index: 30; display: flex; align-items: center; gap: 10px; }
.legend.shifted { bottom: 56px; }
.legend-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); font-weight: 600; margin-bottom: 0; margin-right: 4px; }
.legend-items { display: flex; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>L2 Task Graph <span class="subtitle">· 79 tasks · 7 roles · UK Grocery Retail</span></h1>
  <div class="controls">
    <div class="control-group" id="viewModes">

      <button class="ctrl-btn" data-mode="connectivity" onclick="setViewMode('connectivity')">Connectivity</button>
      <button class="ctrl-btn" data-mode="automation" onclick="setViewMode('automation')">Automation</button>
      <button class="ctrl-btn" data-mode="whitespace" onclick="setViewMode('whitespace')">Whitespace</button>
    </div>
    <div class="control-group">
      <button class="ctrl-btn" id="solutionLensBtn" onclick="toggleSolutionLens()">Solution Lens</button>
    </div>
  </div>
  <div class="role-filters" id="roleFilters"></div>
</div>

<div class="main-container">
  <div class="graph-area" id="graphArea">

<div class="solution-bar" id="solutionBar">

  <button class="sb-reset" onclick="resetSolution()">Reset</button>
</div>

<div class="tooltip" id="tooltip"></div>

function computeTaskPositions() {
  // Group tasks by domain
  const domainTasks = {};
  TASKS.forEach(t => {
    if (!domainTasks[t.domain]) domainTasks[t.domain] = [];
    domainTasks[t.domain].push(t);
  });

  TASKS.forEach(t => {
    const zone = DOMAIN_ZONES[t.domain];
    if (!zone) return;
    const tasks = domainTasks[t.domain];
    const idx = tasks.indexOf(t);
    const cols = Math.max(1, Math.floor(zone.w / (TASK_W + 10)));
    const col = idx % cols;
    const row = Math.floor(idx / cols);
    t.x = zone.x + 12 + col * (TASK_W + 10);
    t.y = zone.y + 28 + row * (TASK_H + 8);
  });
}

// ==================== COLOR HELPERS ====================
const PAIN_COLORS = { low: "#2D7A4F", medium: "#D4A843", high: "#E07A3A", extreme: "#E05252" };

function avgEmotionalCost(task) {
  const levels = { low: 1, medium: 2, high: 3, extreme: 4 };
  const roleKeys = Object.keys(task.roles);
  if (roleKeys.length === 0) return "medium";
  const avg = roleKeys.reduce((s, k) => s + (levels[task.roles[k].ec] || 2), 0) / roleKeys.length;
  if (avg <= 1.5) return "low";
  if (avg <= 2.5) return "medium";
  if (avg <= 3.3) return "high";
  return "extreme";
}

function roleCount(task) {
  return Object.keys(task.roles).length;
}

function getTaskColor(task) {
  if (viewMode === 'pain') {
    return PAIN_COLORS[avgEmotionalCost(task)];
  } else if (viewMode === 'connectivity') {
    const n = roleCount(task);
    if (n >= 5) return "#E05252";
    if (n >= 4) return "#E07A3A";
    if (n >= 3) return "#D4A843";
    if (n >= 2) return "#7078E0";
    return "#2D7A4F";
  } else if (viewMode === 'automation') {
    const ar = task.automationReadiness;
    if (ar <= 1) return "#E05252";
    if (ar <= 2) return "#E07A3A";
    if (ar <= 3) return "#D4A843";
    return "#2D7A4F";
  } else if (viewMode === 'whitespace') {
    return task.noToolExists ? "#E05252" : "#2A2A2E";
  }
  return "#5A5A64";
}

function getTaskBorderWidth(task) {
  const n = roleCount(task);
  return Math.min(1 + n * 0.5, 4);
}

// ==================== RENDERING ====================
const svg = document.getElementById('graphSvg');
const NS = "http://www.w3.org/2000/svg";

function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

function renderGraph() {
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMin meet');

  // Defs
  const defs = el('defs', {}, svg);

  // Glow filter
  const filter = el('filter', { id: 'glow', x: '-50%', y: '-50%', width: '200%', height: '200%' }, defs);
  el('feGaussianBlur', { stdDeviation: '3', result: 'blur' }, filter);
  const feMerge = el('feMerge', {}, filter);
  el('feMergeNode', { in: 'blur' }, feMerge);
  el('feMergeNode', { in: 'SourceGraphic' }, feMerge);

  // Role shadow filter
  const roleShadow = el('filter', { id: 'roleShadow', x: '-20%', y: '-20%', width: '140%', height: '140%' }, defs);
  el('feDropShadow', { dx: '0', dy: '1', stdDeviation: '2', 'flood-color': 'rgba(0,0,0,0.4)', 'flood-opacity': '0.4' }, roleShadow);

  // Arrow marker
  const marker = el('marker', { id: 'arrow', viewBox: '0 0 10 10', refX: '10', refY: '5', markerWidth: '6', markerHeight: '6', orient: 'auto' }, defs);
  el('path', { d: 'M 0 0 L 10 5 L 0 10 z', fill: '#3A3A3E' }, marker);

  // Domain zone labels
  const zoneGroup = el('g', { class: 'zones' }, svg);
  for (const [key, zone] of Object.entries(DOMAIN_ZONES)) {
    el('rect', {
      x: zone.x, y: zone.y, width: zone.w, height: zone.h,
      rx: 8, fill: 'none', stroke: '#1E1E22', 'stroke-width': 1, 'stroke-dasharray': '4,4'
    }, zoneGroup);
    const labelEl = el('text', {
      x: zone.x + 6, y: zone.y + 14, fill: '#2E2E34', 'font-size': '10', 'font-weight': '600',
      'font-family': 'Inter, sans-serif', 'letter-spacing': '1'
    }, zoneGroup);
    labelEl.textContent = zone.label.toUpperCase();
  }

  // Dependency edges
  const depGroup = el('g', { class: 'dep-edges', id: 'depEdges' }, svg);
  renderDependencyEdges(depGroup);

  // Assignment edges (hidden by default)
  const assignGroup = el('g', { class: 'assign-edges', id: 'assignEdges', opacity: '0' }, svg);

  // Task nodes
  const taskGroup = el('g', { class: 'tasks', id: 'taskNodes' }, svg);
  TASKS.forEach(t => renderTaskNode(t, taskGroup));

  // Role nodes
  const roleGroup = el('g', { class: 'roles', id: 'roleNodes' }, svg);
  ROLE_KEYS.forEach(k => renderRoleNode(k, roleGroup));

  updateLegend();
}

function renderDependencyEdges(parent) {
  DEPENDENCIES.forEach(([fromId, toId]) => {
    const from = TASKS.find(t => t.id === fromId);
    const to = TASKS.find(t => t.id === toId);
    if (!from || !to || from.x == null || to.x == null) return;
    const x1 = from.x + TASK_W / 2, y1 = from.y + TASK_H / 2;
    const x2 = to.x + TASK_W / 2, y2 = to.y + TASK_H / 2;
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;
    const dx = x2 - x1, dy = y2 - y1;
    const cx = midX - dy * 0.1;
    const cy = midY + dx * 0.1;
    const d = `M${x1},${y1} Q${cx},${cy} ${x2},${y2}`;
    el('path', {
      d, fill: 'none',
      stroke: '#2A2A2E', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)',
      'data-from': fromId, 'data-to': toId, class: 'dep-edge', opacity: '0.25'
    }, parent);
  });
}

function renderTaskNode(task, parent) {
  if (task.x == null) return;
  const g = el('g', { class: 'task-node', 'data-id': task.id, cursor: 'pointer' }, parent);

  const color = getTaskColor(task);
  const bw = getTaskBorderWidth(task);
  const isDashed = task.noToolExists;

  // Background rect
  const rect = el('rect', {
    x: task.x, y: task.y, width: TASK_W, height: TASK_H,
    rx: 6, fill: '#141416',
    stroke: color, 'stroke-width': bw,
    'stroke-dasharray': isDashed ? '4,2' : 'none',
    class: 'task-rect'
  }, g);

  // Name text (truncated)
  const name = task.name.length > 24 ? task.name.substring(0, 22) + '..' : task.name;
  const text = el('text', {
    x: task.x + TASK_W / 2, y: task.y + TASK_H / 2 + 1,
    fill: '#C8C8D0', 'font-size': '9', 'font-weight': '500',
    'font-family': 'Inter, sans-serif', 'text-anchor': 'middle',
    'dominant-baseline': 'middle', 'pointer-events': 'none'
  }, g);
  text.textContent = name;

  // Role count badge
  const n = roleCount(task);
  if (n > 1) {
    const bx = task.x + TASK_W - 10, by = task.y - 4;
    el('circle', { cx: bx, cy: by, r: 7, fill: color, opacity: '0.9' }, g);
    el('text', {
      x: bx, y: by + 1, fill: '#fff', 'font-size': '8', 'font-weight': '700',
      'font-family': 'Inter, sans-serif', 'text-anchor': 'middle', 'dominant-baseline': 'middle',
      'pointer-events': 'none'
    }, g).textContent = n;
  }

  // No-tool icon
  if (task.noToolExists) {
    el('text', {
      x: task.x + 6, y: task.y - 2, fill: '#E05252', 'font-size': '9',
      'font-family': 'Inter, sans-serif', 'pointer-events': 'none'
    }, g).textContent = '!';
  }

  // Events
  g.addEventListener('mouseenter', (e) => onTaskHover(task, e));
  g.addEventListener('mouseleave', () => onTaskUnhover());
  g.addEventListener('click', (e) => { e.stopPropagation(); onTaskClick(task); });
}

function renderRoleNode(roleKey, parent) {
  const pos = ROLE_POSITIONS[roleKey];
  const role = ROLES[roleKey];
  const g = el('g', { class: 'role-node', 'data-role': roleKey, cursor: 'pointer' }, parent);

  el('rect', {
    x: pos.x, y: pos.y, width: ROLE_W, height: ROLE_H,
    rx: ROLE_H / 2, fill: role.color + '22', stroke: role.color, 'stroke-width': 2,
    class: 'role-rect', filter: 'url(#roleShadow)'
  }, g);

  el('text', {
    x: pos.x + ROLE_W / 2, y: pos.y + ROLE_H / 2 + 1,
    fill: role.color, 'font-size': '11', 'font-weight': '600',
    'font-family': 'Inter, sans-serif', 'text-anchor': 'middle', 'dominant-baseline': 'middle',
    'pointer-events': 'none'
  }, g).textContent = role.name;

  g.addEventListener('mouseenter', (e) => onRoleHover(roleKey, e));
  g.addEventListener('mouseleave', () => onRoleUnhover());
  g.addEventListener('click', (e) => { e.stopPropagation(); onRoleClick(roleKey); });
}

// ==================== INTERACTIONS ====================
function onTaskHover(task, e) {
  if (selectedTask || selectedRole) return;
  hoveredTask = task;
  dimAll(0.15);
  highlightTask(task);
  showTooltip(task, e);
}

function onTaskUnhover() {
  if (selectedTask || selectedRole) return;
  hoveredTask = null;
  undimAll();
  hideAssignEdges();
  hideTooltip();
}

function onRoleHover(roleKey, e) {
  if (selectedTask || selectedRole) return;
  hoveredRole = roleKey;
  dimAll(0.15);
  highlightRole(roleKey);
  showRoleTooltip(roleKey, e);
}

function onRoleUnhover() {
  if (selectedTask || selectedRole) return;
  hoveredRole = null;
  undimAll();
  hideAssignEdges();
  hideTooltip();
}

function onTaskClick(task) {
  if (solutionLensActive) {
    toggleSolved(task.id);
    return;
  }
  selectedTask = (selectedTask === task) ? null : task;
  selectedRole = null;
  if (selectedTask) {
    dimAll(0.15);
    highlightTask(selectedTask);
    showDetailPanel(selectedTask);
  } else {
    undimAll();
    hideAssignEdges();
    closeDetail();
  }
}

function onRoleClick(roleKey) {
  selectedRole = (selectedRole === roleKey) ? null : roleKey;
  selectedTask = null;
  if (selectedRole) {
    dimAll(0.15);
    highlightRole(selectedRole);
    showRoleDetailPanel(selectedRole);
  } else {
    undimAll();
    hideAssignEdges();
    closeDetail();
  }
}

function dimAll(opacity) {
  document.querySelectorAll('.task-node').forEach(n => n.style.opacity = 0.12);
  document.querySelectorAll('.role-node').forEach(n => n.style.opacity = 0.12);
  document.querySelectorAll('.dep-edge').forEach(e => e.style.opacity = '0.05');
}

function undimAll() {
  document.querySelectorAll('.task-node').forEach(n => {
    const id = n.getAttribute('data-id');
    const task = TASKS.find(t => t.id === id);
    const isActiveTask = task && Object.keys(task.roles).some(r => activeRoles[r]);
    n.style.opacity = isActiveTask ? '1' : '0.15';
    n.style.filter = '';
  });
  document.querySelectorAll('.role-node').forEach(n => {
    const rk = n.getAttribute('data-role');
    n.style.opacity = activeRoles[rk] ? '1' : '0.3';
  });
  document.querySelectorAll('.dep-edge').forEach(e => e.style.opacity = '0.25');
  updateSolvedVisuals();
}

function highlightTask(task) {
  const node = document.querySelector(`.task-node[data-id="${task.id}"]`);
  if (node) { node.style.opacity = '1'; node.style.filter = 'url(#glow)'; }

  // Show assignment edges
  showAssignEdgesForTask(task);

  // Highlight connected roles
  Object.keys(task.roles).forEach(rk => {
    const rn = document.querySelector(`.role-node[data-role="${rk}"]`);
    if (rn) rn.style.opacity = '1';
  });

  // Highlight dependency neighbors
  DEPENDENCIES.forEach(([from, to]) => {
    if (from === task.id || to === task.id) {
      const otherId = from === task.id ? to : from;
      const otherNode = document.querySelector(`.task-node[data-id="${otherId}"]`);
      if (otherNode) otherNode.style.opacity = '0.7';
      document.querySelectorAll(`.dep-edge[data-from="${from}"][data-to="${to}"]`).forEach(e => {
        e.style.opacity = '0.8';
        e.style.stroke = '#5E6AD2';
      });
    }
  });
}

function highlightRole(roleKey) {
  const rn = document.querySelector(`.role-node[data-role="${roleKey}"]`);
  if (rn) { rn.style.opacity = '1'; rn.style.filter = 'url(#glow)'; }

  TASKS.forEach(t => {
    if (t.roles[roleKey]) {
      const node = document.querySelector(`.task-node[data-id="${t.id}"]`);
      if (node) node.style.opacity = '1';
    }
  });

  showAssignEdgesForRole(roleKey);
}

function showAssignEdgesForTask(task) {
  hideAssignEdges();
  const group = document.getElementById('assignEdges');
  group.setAttribute('opacity', '1');
  Object.keys(task.roles).forEach(rk => {
    if (!activeRoles[rk]) return;
    const rPos = ROLE_POSITIONS[rk];
    const rx = rPos.x + ROLE_W / 2, ry = rPos.y + ROLE_H / 2;
    const tx = task.x + TASK_W / 2, ty = task.y + TASK_H / 2;
    const midX = (rx + tx) / 2, midY = (ry + ty) / 2;
    const dx = tx - rx, dy = ty - ry;
    const cx = midX + dy * 0.08, cy = midY - dx * 0.08;
    el('path', {
      d: `M${rx},${ry} Q${cx},${cy} ${tx},${ty}`, fill: 'none',
      stroke: ROLES[rk].color, 'stroke-width': '1.5', opacity: '0.35',
      class: 'assign-edge-line'
    }, group);
  });
}

function showAssignEdgesForRole(roleKey) {
  hideAssignEdges();
  const group = document.getElementById('assignEdges');
  group.setAttribute('opacity', '1');
  const rPos = ROLE_POSITIONS[roleKey];
  const rx = rPos.x + ROLE_W / 2, ry = rPos.y + ROLE_H / 2;
  TASKS.forEach(t => {
    if (t.roles[roleKey]) {
      const tx = t.x + TASK_W / 2, ty = t.y + TASK_H / 2;
      const midX = (rx + tx) / 2, midY = (ry + ty) / 2;
      const dx = tx - rx, dy = ty - ry;
      const cx = midX + dy * 0.08, cy = midY - dx * 0.08;
      el('path', {
        d: `M${rx},${ry} Q${cx},${cy} ${tx},${ty}`, fill: 'none',
        stroke: ROLES[roleKey].color, 'stroke-width': '1.5', opacity: '0.35',
        class: 'assign-edge-line'
      }, group);
    }
  });
}

function hideAssignEdges() {
  const group = document.getElementById('assignEdges');
  if (group) {
    group.querySelectorAll('.assign-edge-line').forEach(l => l.remove());
    group.setAttribute('opacity', '0');
  }
  // Reset dep edge colors
  document.querySelectorAll('.dep-edge').forEach(e => {
    e.style.stroke = '';
  });
}

// ==================== TOOLTIPS ====================
function showTooltip(task, e) {
  const tt = document.getElementById('tooltip');
  const n = roleCount(task);
  const avgEC = avgEmotionalCost(task);
  const roleNames = Object.keys(task.roles).map(r => ROLES[r].name).join(', ');
  tt.innerHTML = `
    <div class="tt-name">${task.name}</div>
    <div class="tt-row">${DOMAINS[task.domain]?.name || task.domain} | ${task.frequency} | ~${task.avgDuration} min</div>
    <div class="tt-row">Roles: ${n} (${roleNames})</div>
    <div class="tt-row">Avg pain: ${avgEC} | Automation: ${task.automationReadiness}/5${task.noToolExists ? ' | NO TOOL EXISTS' : ''}</div>
    <div class="tt-quote" style="border-left-color:${PAIN_COLORS[avgEC]}">"${task.topQuote.length > 80 ? task.topQuote.substring(0, 77) + '...' : task.topQuote}"</div>
  `;
  tt.classList.add('visible');
  positionTooltip(e);
}

function showRoleTooltip(roleKey, e) {
  const tt = document.getElementById('tooltip');
  const role = ROLES[roleKey];
  const taskCount = TASKS.filter(t => t.roles[roleKey]).length;
  const domains = [...new Set(TASKS.filter(t => t.roles[roleKey]).map(t => t.domain))];
  tt.innerHTML = `
    <div class="tt-name">${role.fullName}</div>
    <div class="tt-row">${role.salary} | ${role.hours}</div>
    <div class="tt-row">Tasks: ${taskCount} | Domains: ${domains.length}</div>
  `;
  tt.classList.add('visible');
  positionTooltip(e);
}

function positionTooltip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 12, y = e.clientY + 12;
  if (x + 300 > window.innerWidth) x = e.clientX - 310;
  if (y + 150 > window.innerHeight) y = e.clientY - 160;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

document.addEventListener('mousemove', (e) => {
  if (hoveredTask || hoveredRole) positionTooltip(e);
});

// ==================== DETAIL PANEL ====================

  let rolesHTML = '';
  for (const [rk, rd] of Object.entries(task.roles)) {
    if (!ROLES[rk]) continue;
    rolesHTML += `
      <div class="dp-role-entry" style="border-left: 3px solid ${ROLES[rk].color}">
        <div class="dp-role-name" style="color: ${ROLES[rk].color}">${ROLES[rk].fullName}</div>
        <div class="dp-indicators">
          <span class="dp-indicator ${rd.u}">Uncertainty: ${rd.u}</span>
          <span class="dp-indicator ${rd.b}">Blame: ${rd.b}</span>
          <span class="dp-indicator ${rd.i}">Identity: ${rd.i}</span>
          <span class="dp-indicator ${rd.f}">Fatigue: ${rd.f}</span>
        </div>
        <div style="font-size:11px;color:var(--text-muted)">Body budget: <strong style="color:${rd.bb <= -8 ? 'var(--red)' : rd.bb <= -5 ? 'var(--orange)' : 'var(--yellow)'}">${rd.bb}</strong></div>
        <div class="dp-quote">"${rd.quote}"</div>

  }

  const upstreamDeps = DEPENDENCIES.filter(d => d[1] === task.id).map(d => TASKS.find(t => t.id === d[0])).filter(Boolean);
  const downstreamDeps = DEPENDENCIES.filter(d => d[0] === task.id).map(d => TASKS.find(t => t.id === d[1])).filter(Boolean);

  content.innerHTML = `
    <div class="dp-title">${task.name}</div>
    <div class="dp-domain" style="background: ${domainInfo.color}22; color: ${domainInfo.color}">${domainInfo.name}</div>
    <div class="dp-row"><span class="dp-row-label">Frequency</span><span class="dp-row-value">${task.frequency}</span></div>
    <div class="dp-row"><span class="dp-row-label">Avg Duration</span><span class="dp-row-value">~${task.avgDuration} min</span></div>
    <div class="dp-row"><span class="dp-row-label">Roles performing</span><span class="dp-row-value">${roleCount(task)}</span></div>
    <div class="dp-row"><span class="dp-row-label">Automation readiness</span><span class="dp-row-value">${task.automationReadiness}/5</span></div>
    <div class="dp-row"><span class="dp-row-label">No tool exists</span><span class="dp-row-value" style="color:${task.noToolExists ? 'var(--red)' : 'var(--green)'}">${task.noToolExists ? 'YES' : 'No'}</span></div>

    <div class="dp-section">
      <div class="dp-section-title">Current Tools</div>
      <div class="dp-tools">${task.currentTools.map(t => `<span class="dp-tool-tag">${t}</span>`).join('')}</div>
    </div>

    <div class="dp-section">
      <div class="dp-section-title">Roles Performing This Task</div>
      ${rolesHTML}
    </div>

    ${upstreamDeps.length ? `<div class="dp-section"><div class="dp-section-title">Upstream Dependencies</div>${upstreamDeps.map(t => `<div style="font-size:12px;color:var(--text-muted);margin:2px 0;cursor:pointer" onclick="onTaskClick(TASKS.find(x=>x.id==='${t.id}'))">&larr; ${t.name}</div>`).join('')}</div>` : ''}
    ${downstreamDeps.length ? `<div class="dp-section"><div class="dp-section-title">Downstream Dependencies</div>${downstreamDeps.map(t => `<div style="font-size:12px;color:var(--text-muted);margin:2px 0;cursor:pointer" onclick="onTaskClick(TASKS.find(x=>x.id==='${t.id}'))">&rarr; ${t.name}</div>`).join('')}</div>` : ''}

    <div class="dp-impact">
      <div class="dp-impact-title">If solved</div>
      <div class="dp-impact-text">Affects <strong>${roleCount(task)}</strong> roles, <strong>${downstreamDeps.length}</strong> downstream tasks</div>
    </div>
  `;
  panel.classList.add('open');
}

function showRoleDetailPanel(roleKey) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  const role = ROLES[roleKey];

  const roleTasks = TASKS.filter(t => t.roles[roleKey]);
  const byDomain = {};
  roleTasks.forEach(t => {
    const d = DOMAINS[t.domain]?.name || t.domain;
    if (!byDomain[d]) byDomain[d] = [];
    byDomain[d].push(t);
  });

  let domainsHTML = '';
  for (const [domain, tasks] of Object.entries(byDomain)) {
    domainsHTML += `<div class="dp-section-title" style="margin-top:12px">${domain}</div>`;
    domainsHTML += tasks.map(t => {
      const rd = t.roles[roleKey];
      const ec = rd.ec;
      const color = PAIN_COLORS[ec];
      return `<div style="display:flex;align-items:center;gap:6px;margin:3px 0;cursor:pointer" onclick="onTaskClick(TASKS.find(x=>x.id==='${t.id}'))">
        <span style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0"></span>
        <span style="font-size:11px;color:var(--text-muted)">${t.name}</span>
        <span style="font-size:9px;color:var(--text-dim);margin-left:auto">${rd.bb}</span>
      </div>`;
    }).join('');
  }

  content.innerHTML = `
    <div class="dp-title" style="color:${role.color}">${role.fullName}</div>
    <div class="dp-row"><span class="dp-row-label">Salary</span><span class="dp-row-value">${role.salary}</span></div>
    <div class="dp-row"><span class="dp-row-label">Hours</span><span class="dp-row-value">${role.hours}</span></div>
    <div class="dp-row"><span class="dp-row-label">Tasks in graph</span><span class="dp-row-value">${roleTasks.length}</span></div>
    <div class="dp-row"><span class="dp-row-label">Domains spanned</span><span class="dp-row-value">${Object.keys(byDomain).length}</span></div>
    <div class="dp-section">
      <div class="dp-section-title">All Tasks (by domain)</div>
      ${domainsHTML}
    </div>
  `;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedTask = null;
  selectedRole = null;
  undimAll();
  hideAssignEdges();
}

// ==================== ROLE FILTER ====================
function initRoleFilters() {
  const container = document.getElementById('roleFilters');
  ROLE_KEYS.forEach(rk => {
    const role = ROLES[rk];
    const btn = document.createElement('button');
    btn.className = 'role-filter active';
    btn.style.borderColor = role.color;
    btn.style.color = role.color;
    btn.style.background = role.color + '15';
    btn.textContent = role.name;
    btn.dataset.role = rk;
    btn.addEventListener('click', () => toggleRoleFilter(rk));
    container.appendChild(btn);
  });
}

function toggleRoleFilter(roleKey) {
  activeRoles[roleKey] = !activeRoles[roleKey];
  const btn = document.querySelector(`.role-filter[data-role="${roleKey}"]`);
  btn.classList.toggle('active', activeRoles[roleKey]);
  btn.style.background = activeRoles[roleKey] ? ROLES[roleKey].color + '15' : 'transparent';

  // Update visibility
  undimAll();
  if (selectedTask) {
    dimAll(0.15);
    highlightTask(selectedTask);
  }
  if (selectedRole) {
    dimAll(0.15);
    highlightRole(selectedRole);
  }
}

// ==================== SOLUTION LENS ====================
function toggleSolutionLens() {
  solutionLensActive = !solutionLensActive;
  document.getElementById('solutionLensBtn').classList.toggle('active', solutionLensActive);
  document.getElementById('solutionBar').classList.toggle('visible', solutionLensActive);
  document.getElementById('legend').classList.toggle('shifted', solutionLensActive);
  if (!solutionLensActive) {
    solvedTasks.clear();
    updateSolvedVisuals();
  }
  closeDetail();
}

function toggleSolved(taskId) {
  if (solvedTasks.has(taskId)) solvedTasks.delete(taskId);
  else solvedTasks.add(taskId);
  updateSolvedVisuals();
  updateSolutionStats();
}

function updateSolvedVisuals() {
  if (!solutionLensActive) {
    // Reset
    TASKS.forEach(t => {
      const rect = document.querySelector(`.task-node[data-id="${t.id}"] .task-rect`);
      if (rect) {
        rect.setAttribute('stroke-dasharray', t.noToolExists ? '4,2' : 'none');
      }
    });
    return;
  }

  // Get cascade (downstream of solved)
  const cascade = new Set();
  function addDownstream(id) {
    DEPENDENCIES.forEach(([from, to]) => {
      if (from === id && !cascade.has(to) && !solvedTasks.has(to)) {
        cascade.add(to);
      }
    });
  }
  solvedTasks.forEach(id => addDownstream(id));

  TASKS.forEach(t => {
    const node = document.querySelector(`.task-node[data-id="${t.id}"]`);
    const rect = document.querySelector(`.task-node[data-id="${t.id}"] .task-rect`);
    if (!node || !rect) return;
    if (solvedTasks.has(t.id)) {
      rect.setAttribute('stroke', '#2D7A4F');
      rect.setAttribute('stroke-dasharray', '6,3');
      rect.setAttribute('stroke-width', '2.5');
      node.style.opacity = '1';
    } else if (cascade.has(t.id)) {
      rect.setAttribute('stroke', '#2D7A4F');
      rect.setAttribute('stroke-dasharray', '3,3');
      rect.setAttribute('stroke-width', '1.5');
      node.style.opacity = '0.7';
    } else {
      rect.setAttribute('stroke', getTaskColor(t));
      rect.setAttribute('stroke-dasharray', t.noToolExists ? '4,2' : 'none');
      rect.setAttribute('stroke-width', getTaskBorderWidth(t));
    }
  });
}

function updateSolutionStats() {
  const solved = solvedTasks.size;
  const rolesAffected = new Set();
  let totalBB = 0;
  solvedTasks.forEach(id => {
    const t = TASKS.find(x => x.id === id);
    if (t) {
      Object.keys(t.roles).forEach(r => rolesAffected.add(r));
      Object.values(t.roles).forEach(rd => totalBB += Math.abs(rd.bb));
    }
  });

  // Count downstream
  const downstream = new Set();
  function addDown(id) {
    DEPENDENCIES.forEach(([from, to]) => {
      if (from === id && !downstream.has(to) && !solvedTasks.has(to)) {
        downstream.add(to);
        addDown(to);
      }
    });
  }
  solvedTasks.forEach(id => addDown(id));

  document.getElementById('sbSolved').textContent = solved;
  document.getElementById('sbRoles').textContent = rolesAffected.size;
  document.getElementById('sbDownstream').textContent = downstream.size;
  document.getElementById('sbBudget').textContent = '+' + totalBB;
}

function resetSolution() {
  solvedTasks.clear();
  updateSolvedVisuals();
  updateSolutionStats();
}

// ==================== CLICK OUTSIDE ====================
document.getElementById('graphSvg').addEventListener('click', (e) => {
  if (e.target === svg || e.target.tagName === 'svg') {
    selectedTask = null;
    selectedRole = null;
    undimAll();
    hideAssignEdges();
    closeDetail();
  }
});

// ==================== INIT ====================
initRoleFilters();
renderGraph();
</script>
